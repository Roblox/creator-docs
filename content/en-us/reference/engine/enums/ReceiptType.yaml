name: ReceiptType
type: enum
summary: |
  `ReceiptType` is used to work with server-sided receipt processing.
description: |
  `ReceiptType` works with `Class.MarketplaceService:BindReceiptHandler()` to
  indicate the different type of receipts a developer can bind to for
  processing. When you call
  `Class.MarketplaceService:BindReceiptHandler()|BindReceiptHandler`, you
  pass a `ReceiptType` to specify which kind of receipt your handler should
  process.

  For Robux transfers initiated with
  `Class.MarketplaceService:PromptRobuxTransferAsync()|PromptRobuxTransferAsync`,
  two receipts are generated: one for the sender
  (`RobuxTransferSender`) and one for the receiver
  (`RobuxTransferReceiver`). You should register handlers for both types to
  fully process a transfer.
