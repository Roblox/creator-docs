events:
  - name: TextBox.Focused
    summary: |
      Fires when the `TextBox` gains focus.
    description: |
      This event fires when the `TextBox` gains focus, typically when a player
      clicks/taps on the `TextBox` to begin text entry. Also fires if `TextBox`
      focus is forced through `Class.TextBox:CaptureFocus()|CaptureFocus()`.

      This event can be used alongside `Class.TextBox.FocusLost|FocusLost` to
      track when a `TextBox` both gains and loses focus.
    code_samples:
      - TextBox-Focus
    parameters: []
    tags: []
    deprecation_message: ''
    security: None
    capabilities:
      - UI
  - name: TextBox.FocusLost
    summary: |
      Fires when the `TextBox` loses its focus.
    description: |
      This event fires when the `TextBox` loses its focus, typically when a
      player clicks/taps outside of it or presses <kbd>Enter</kbd>. Also fires
      if `TextBox` focus release is forced through
      `Class.TextBox:ReleaseFocus()|ReleaseFocus()`.

      This event can be used alongside `Class.TextBox.FocusLost|FocusLost` to
      track when a `TextBox` both gains and loses focus.
    code_samples:
      - TextBox-Focus
    parameters:
      - name: enterPressed
        type: boolean
        default:
        summary: |
          A boolean indicating whether the client pressed <kbd>Enter</kbd> to
          lose focus (`true`) or not (`false`).
      - name: inputThatCausedFocusLoss
        type: InputObject
        default:
        summary: |
          An `Class.InputObject` instance indicating the type of input that
          caused the `TextBox` to lose focus.
    tags: []
    deprecation_message: ''
    security: None
