  - name: TextBox.TextWrapped
    summary: |
      Determines if text wraps to multiple lines within the `TextBox` element
      space, truncating excess text.
    description: |
      When enabled, this property will render text on multiple lines within a
      `TextBox` element's space so that `Class.TextBox.TextBounds|TextBounds`
