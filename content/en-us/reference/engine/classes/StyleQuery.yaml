  - name: StyleQuery.IsActive
    summary: |
      A boolean that determines whether a `Class.StyleRule.Selector` of `@` will
      match the `Class.StyleQuery` name.
    description: |
      A boolean that determines whether a `Class.StyleRule.Selector` of `@` will
      match the `StyleQuery` name. For example, if a `StyleQuery` named
      `SmGamepad` has conditions set for `Class.UserInputService.PreferredInput`
      of `Enum.PreferredInput.Gamepad|Gamepad` and
      `Class.GuiService.ViewportDisplaySize` of `Enum.DisplaySize.Small|Small`
      and both of these conditions are `true` (player is playing on a small
      display size and using a gamepad), the parent of the `StyleQuery` will
      match any `Class.StyleRule.Selector` `@SmGamepad`.

