  - name: GeometryService:FragmentAsync
    summary: |
      Breaks a `Class.BasePart` into multiple `Class.MeshPart` instances,
      according to the pattern of points passed in, by using voronoi
      decomposition.
    description: |
      Breaks a `Class.BasePart` into multiple `Class.MeshPart` instances,
      according to the pattern of points passed in, by using voronoi
      decomposition. `Class.Terrain` is not supported. Similar to
      `Class.Instance:Clone()|Clone()`, the returned parts have no set
      `Class.Instance.Parent|Parent`.

      For more information and detailed examples, see
      https://create.roblox.com/docs/parts/solid-modeling#in-experience-solid-modeling.
    code_samples:
      - GeometryService-FragmentAsync
    parameters:
      - name: part
        type: BasePart
        default:
        summary: |
          A `Class.Part`, `Class.PartOperation`, or `Class.MeshPart` to operate
          on.
      - name: sites
        type: Array
        default:
        summary: |
          Array of `Vector3` defining the site positions. Each site will become
          a separate part. You can also provide a jagged 2D array of `Vector3`
          by including inner arrays of `Vector3` as elements of the outer array.
          Each inner array will have all of its voronoi cells merged into a
          single part. `Class.GeometryService:GenerateFragmentSites` can be used
          to easily create this input.
      - name: options
        type: Dictionary
        default: nil
        summary: |
          Options table containing all the controls for the method:

          - `CollisionFidelity` â€” The value of
            `Class.TriangleMeshPart.CollisionFidelity|CollisionFidelity` in the
            resulting parts, with one caveat: If a 2D array of sites is
            provided, this collision fidelity will only be applied to parts
            which came from more than one site. The others will be given `Hull`
            precision.
          - `RenderFidelity` â€” The value of
            `Class.MeshPart.RenderFidelity|RenderFidelity` in the resulting
            parts.
          - `FluidFidelity` â€” The value of
            `Class.TriangleMeshPart.FluidFidelity|FluidFidelity` in the
            resulting parts.
          - `SplitApart` â€” Boolean controlling whether a part should be split
            into multiple parts if it contains multiple connected components.
            Default is `true` (split).
    returns:
      - type: Array
        summary: |
          Array of `Class.MeshPart` along with mapping info. Each array element
          is a Dictionary with two elements:
          `{ â€śInstanceâ€ť: instance, â€śIndexâ€ť: index }`. `Index` is the index in
          the outer array of sites; in other words, it tells you which group of
