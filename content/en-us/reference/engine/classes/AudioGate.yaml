  - name: AudioGate.Threshold
    summary: |
      The gain value(s) around which the gate opens and closes.
    description: |
      The gain value(s), in decibels, at which the gate will transition from
      being closed (i.e. muted) to being open (i.e. unmuted).

      `Class.AudioGate.Threshold` is a `Class.NumberRange` with a "low" and a
      "high" threshold. The gate starts out muted - when the input stream's
      volume rises above the "high" threshold, the gate will unmute the audio
      stream over the course of `Class.AudioGate.Attack|Attack` seconds. If the
      input stream's volume then dips below the "low" threshold, the gate will
      mute the audio stream over the course of `Class.AudioGate.Release|Release`
      seconds. The two "low" and "high" thresholds create a hysteresis region to
      prevent the gate from opening and closing very rapidly.

      Ranges from -80 to 30, and defaults to -36 (low) and -24 (high).
    code_samples: []
