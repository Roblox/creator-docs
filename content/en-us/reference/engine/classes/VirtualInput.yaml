description: |
  `Class.VirtualInput` allows Studio plugins to simulate mouse, keyboard, and
  pointer input as if it were performed by a real player. It is intended for
  **testing purposes only** and can only be obtained by calling
  `Class.UserInputService:CreateVirtualInput()`. It can only be used from a
  Studio plugin script.

  All input methods throw a runtime error if the simulated input would interact
  with Roblox's built-in UI (`Class.CoreGui`), such as the top bar, chat window,
  or escape menu. This prevents plugin automation from accidentally interfering
  with system UI that players depend on.
