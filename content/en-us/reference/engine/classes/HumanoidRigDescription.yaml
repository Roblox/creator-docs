methods:
  - name: HumanoidRigDescription:AutoRig
    summary: ''
    description: |
      Automatically maps joints from the given character model to the
      corresponding properties on this `HumanoidRigDescription`. Searches the
      model's descendants for `Class.Motor6D`, `Class.AnimationConstraint`, or
      `Class.Bone` instances whose names match the standard joint names and
      assigns them.

      This method is only available in Roblox Studio. Pass `nil` to use the
      first ancestor `Model` of this instance as the character.
    code_samples: []
    parameters:
      - name: character
        type: Instance?
        default:
        summary: |
          Instance?
    returns:
      - type: ()
        summary: |
          void
    tags: []
    deprecation_message: ''
    security: RobloxScriptSecurity
    thread_safety: Safe
    capabilities:
      - Animation
  - name: HumanoidRigDescription:GetJointFromName
    summary: ''
    description: |
      Returns the joint instance associated with the given joint name. Accepts
      both standard joint names (e.g., `"LeftShoulder"`) and R15 body part names
      (e.g., `"LeftLowerLeg"`). Name matching is case-insensitive. Returns `nil`
      if no joint with the given name is mapped.
    code_samples: []
    parameters:
      - name: name
        type: string
        default:
        summary: |
          string
    returns:
      - type: Instance
        summary: |
          Instance
    tags: []
    deprecation_message: ''
    security: None
    thread_safety: Safe
    capabilities:
      - Animation
  - name: HumanoidRigDescription:GetJointNames
    summary: ''
    description: |
      Returns an array of all 22 standard joint name strings for this rig
      description, in hierarchy order: Root, Waist, Spine, Chest, Neck,
      HeadBase, LeftClavicle, LeftShoulder, LeftElbow, LeftWrist, RightClavicle,
      RightShoulder, RightElbow, RightWrist, LeftHip, LeftKnee, LeftAnkle,
      LeftToeBase, RightHip, RightKnee, RightAnkle, RightToeBase.
