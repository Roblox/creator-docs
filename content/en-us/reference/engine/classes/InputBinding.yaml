methods:
  - name: InputBinding:Fire
    summary: |
      Programmatically updates the parent `Class.InputAction` state through this
      binding.
    description: |
      Programmatically updates the parent `Class.InputAction` to the given state
      and fires the appropriate signals (`Class.InputAction.Pressed|Pressed`,
      `Class.InputAction.Released|Released`,
      `Class.InputAction.StateChanged|StateChanged`).

      This method can only be called on bindings with
      `Class.InputBinding.Type|Type` set to `Enum.InputBindingType|Scriptable`.
      Calling it on an `Enum.InputBindingType|Automatic` binding will throw an
      error.

      The `state` parameter must match the `Class.InputAction.Type|Type` of the
      parent `Class.InputAction`:

      - `Enum.InputActionType|Bool` expects a `boolean`
      - `Enum.InputActionType|Direction1D` expects a `number`
      - `Enum.InputActionType|Direction2D` expects a `Datatype.Vector2`
      - `Enum.InputActionType|Direction3D` expects a `Datatype.Vector3`
      - `Enum.InputActionType|ViewportPosition` expects a `Datatype.Vector2`

      Passing a mismatched type will cause an error. This method respects the
      same deduplication rules as hardware input, as in consecutive calls with
      the same state value will not re‑fire events.

      The parent `Class.InputAction` must be `Class.InputAction.Enabled|Enabled`
      and its ancestor `Class.InputContext` must also be
      `Class.InputContext.Enabled|Enabled`, otherwise the call is silently
      ignored.
