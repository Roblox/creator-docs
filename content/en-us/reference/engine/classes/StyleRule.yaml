      - `Datatype.TweenInfo.EasingStyle|EasingStyle` &mdash; The easing function
        used for interpolation.
      - `Datatype.TweenInfo.EasingDirection|EasingDirection` &mdash; The
        direction of the easing function.
      - `Datatype.TweenInfo.DelayTime|DelayTime` &mdash; Delay in seconds before
        the transition starts.

      Note that the `Datatype.TweenInfo.RepeatCount|RepeatCount` and
      `Datatype.TweenInfo.Reverses|Reverses` fields of `Datatype.TweenInfo` are
      ignored, as style transitions cannot repeat or reverse automatically.

