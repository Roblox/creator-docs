  - name: AdService:RegisterDisclosureButton
    summary: |
      Registers an ad disclosure button for an
      [ad integration](../../../production/promotion/ad-integrations.md).
    description: |
      This method may only be called from a `Class.Script` with
      `Enum.RunContext.Client`.

      `Class.AdService:RegisterDisclosureButton()|RegisterDisclosureButton`
      marks a button in your experience as an ad disclosure for an ad
      integration. When a user clicks it, they can see who is paying for the ad.
      See
      [ad integrations](../../../production/promotion/ad-integrations.md#labeling-and-disclosure)
      for guidance on what the disclosures should look like and when they should
      be visible.

      Note: you must verify that the `Class.Players.LocalPlayer|LocalPlayer` is
      eligible to see the associated ad integration campaign by calling
      `Class.AdService:GetCampaignEligibilityAsync()|GetCampaignEligibilityAsync`
      and verifying that `result.IsEligible` is `true` before attempting to
      register a disclosure button for it. If you do not wait, or the
      `Class.Players.LocalPlayer|LocalPlayer` is not eligible to see the
      associated campaign, then
      `Class.AdService:RegisterDisclosureButton()|RegisterDisclosureButton` will
      raise an error.
    code_samples: []
    parameters:
      - name: disclosureButton
        type: GuiButton
        default:
        summary: |
          The `Class.GuiButton` you want to mark as an ad integration
          disclosure. The `Class.GuiButton` must follow labeling guidelines
          outlined
          [here](../../../production/promotion/ad-integrations.md#labeling-and-disclosure).
      - name: adIntegrationPlacementId
        type: string
        default:
        summary: |
          The ID of the placement that this disclosure is attached to.
    returns:
